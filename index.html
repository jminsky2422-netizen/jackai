<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jack AI</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap");

      /* Jack AI — theme tokens (indigo + warm lavender) */
      :root {
        --font-sans: "Outfit", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
        --radius-pill: 999px;
        --radius-header: 22px;
        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --header-h: 72px;
      }

      [data-theme="dark"] {
        --bg: #13101a;
        --bg-elevated: #1c1828;
        --bg-subtle: #252032;
        --bg-chat: #161320;
        --border: #3d3650;
        --text: #ffffff;
        --text-muted: #c4bdd8;
        --accent: #c9b5ff;
        --accent-strong: #8b6dff;
        --accent-hover: #9d7fff;
        --on-accent: #ffffff;
        --user-bubble: #352f4d;
        --jack-bubble: #221d30;
        --input-bg: #1e1a29;
        --danger: #fb7185;
        --focus-ring: 0 0 0 3px color-mix(in srgb, var(--accent-strong) 45%, transparent);
        --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.38);
        --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.25);
      }

      [data-theme="light"] {
        --bg: #252232;
        --bg-elevated: #322e42;
        --bg-subtle: #3d3752;
        --bg-chat: #2c283c;
        --border: #524c68;
        --text: #ffffff;
        --text-muted: #b8b0d0;
        --accent: #c9b8ff;
        --accent-strong: #9b85ff;
        --accent-hover: #ae9bff;
        --on-accent: #ffffff;
        --user-bubble: #423a62;
        --jack-bubble: #322e42;
        --input-bg: #2f2b40;
        --danger: #fb7185;
        --focus-ring: 0 0 0 3px color-mix(in srgb, var(--accent-strong) 35%, transparent);
        --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.35);
        --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.22);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: var(--font-sans);
        font-size: 17px;
        line-height: 1.55;
        color: var(--text);
        background: var(--bg);
        background-image: radial-gradient(
            1200px 600px at 10% -10%,
            color-mix(in srgb, var(--accent-strong) 18%, transparent),
            transparent 55%
          ),
          radial-gradient(900px 500px at 100% 0%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 50%);
        -webkit-font-smoothing: antialiased;
      }

      .app {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        max-width: 780px;
        margin: 0 auto;
        padding: 0.65rem 1rem 1rem;
        padding-bottom: calc(var(--header-h) * 0.2);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1.15rem;
        min-height: var(--header-h);
        flex-wrap: wrap;
        border-radius: var(--radius-header);
        border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        position: sticky;
        top: 0.65rem;
        z-index: 20;
        background: linear-gradient(
          165deg,
          color-mix(in srgb, var(--bg-elevated) 88%, transparent) 0%,
          color-mix(in srgb, var(--bg) 72%, transparent) 100%
        );
        backdrop-filter: blur(20px) saturate(1.25);
        -webkit-backdrop-filter: blur(20px) saturate(1.25);
        box-shadow: var(--shadow-card), 0 1px 0 color-mix(in srgb, #fff 10%, transparent) inset;
        margin-bottom: 0.75rem;
      }

      [data-theme="light"] .header {
        background: linear-gradient(
          165deg,
          color-mix(in srgb, var(--bg-elevated) 82%, var(--accent-strong)) 0%,
          color-mix(in srgb, var(--bg-subtle) 65%, var(--bg)) 100%
        );
        box-shadow: var(--shadow-soft), 0 1px 0 color-mix(in srgb, #fff 8%, transparent) inset;
        border-color: color-mix(in srgb, var(--border) 55%, transparent);
      }

      .header__brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header__logo {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-md);
        background: linear-gradient(145deg, var(--accent-strong), color-mix(in srgb, var(--accent) 70%, #c084fc));
        color: var(--on-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: -0.03em;
        box-shadow: var(--shadow-card);
      }

      .header__title {
        margin: 0;
        font-size: 1.45rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.15;
      }

      .header__subtitle {
        margin: 0.15rem 0 0;
        font-size: 0.92rem;
        color: var(--text-muted);
        font-weight: 500;
        max-width: 280px;
      }

      .header__actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.55rem 1rem;
        min-height: 44px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        cursor: pointer;
        transition: background var(--transition), color var(--transition), border-color var(--transition),
          box-shadow var(--transition), transform 0.1s ease;
      }

      .btn:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .btn:active:not(:disabled) {
        transform: scale(0.98);
      }

      .btn:disabled {
        opacity: 0.48;
        cursor: not-allowed;
      }

      .btn--primary {
        background: linear-gradient(145deg, var(--accent-strong), var(--accent-hover));
        color: var(--on-accent);
        box-shadow: 0 4px 14px color-mix(in srgb, var(--accent-strong) 40%, transparent);
        padding-inline: 1.15rem;
      }

      .btn--primary:hover:not(:disabled) {
        filter: brightness(1.06);
        box-shadow: 0 6px 20px color-mix(in srgb, var(--accent-strong) 48%, transparent);
      }

      .btn--secondary {
        background: var(--bg-elevated);
        color: var(--text);
        border-color: var(--border);
        box-shadow: var(--shadow-card);
      }

      .btn--secondary:hover:not(:disabled) {
        border-color: var(--accent-strong);
        color: var(--accent-strong);
      }

      .btn--ghost {
        background: transparent;
        color: var(--text-muted);
        border-color: var(--border);
      }

      .btn--ghost:hover:not(:disabled) {
        color: var(--text);
        background: color-mix(in srgb, var(--bg-subtle) 80%, transparent);
        border-color: color-mix(in srgb, var(--border) 80%, var(--accent));
      }

      #btnTheme {
        min-width: 44px;
        padding-inline: 0.75rem;
      }

      [data-theme="dark"] .theme-icon--light {
        display: inline;
      }

      [data-theme="dark"] .theme-icon--dark {
        display: none;
      }

      [data-theme="light"] .theme-icon--light {
        display: none;
      }

      [data-theme="light"] .theme-icon--dark {
        display: inline;
      }

      .main {
        flex: 1;
        min-height: 220px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-bottom: 6.5rem;
      }

      .chat-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        margin-top: 0.5rem;
        border-radius: var(--radius-lg);
        background: color-mix(in srgb, var(--bg-chat) 92%, transparent);
        border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 6%, transparent);
      }

      [data-theme="light"] .chat-wrap {
        box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 6%, transparent);
      }

      .chat {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.25rem 1rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }

      .chat:focus-visible {
        outline: none;
      }

      .chat__welcome {
        text-align: center;
        padding: 1.75rem 1.35rem;
        margin: 0.5rem auto 0;
        max-width: 520px;
        color: var(--text-muted);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
      }

      .chat__welcome strong {
        color: var(--text);
        display: block;
        margin-bottom: 0.65rem;
        font-size: 1.28rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .chat__welcome-lead {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.55;
        font-weight: 500;
      }

      .chat__welcome-lead strong {
        display: inline;
        font-size: inherit;
        margin: 0;
        color: var(--accent-strong);
      }

      .welcome-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        justify-content: center;
        margin-top: 1.35rem;
      }

      .welcome-chip {
        font-family: inherit;
        font-size: 0.86rem;
        font-weight: 600;
        color: var(--text);
        padding: 0.55rem 0.95rem;
        min-height: 44px;
        border-radius: var(--radius-pill);
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        cursor: pointer;
        transition: border-color var(--transition), background var(--transition), color var(--transition),
          transform 0.1s ease;
        text-align: center;
        line-height: 1.3;
      }

      .welcome-chip:hover {
        border-color: var(--accent-strong);
        color: var(--accent-strong);
        background: color-mix(in srgb, var(--bg-elevated) 70%, var(--bg-subtle));
      }

      .welcome-chip:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .welcome-chip:active {
        transform: scale(0.98);
      }

      .msg {
        display: flex;
        gap: 0.75rem;
        max-width: 95%;
        animation: fadeIn 0.28s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg--user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .msg__avatar {
        flex-shrink: 0;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        background: var(--jack-bubble);
        border: 1px solid var(--border);
        color: var(--accent-strong);
      }

      .msg--user .msg__avatar {
        background: var(--user-bubble);
        color: var(--text);
        border-color: color-mix(in srgb, var(--border) 50%, transparent);
      }

      .msg__bubble {
        padding: 0.9rem 1.1rem;
        border-radius: var(--radius-lg);
        border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
        background: var(--jack-bubble);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.98rem;
        line-height: 1.5;
        box-shadow: 0 1px 0 color-mix(in srgb, #fff 5%, transparent);
      }

      .msg--user .msg__bubble {
        background: var(--user-bubble);
        border-color: transparent;
        box-shadow: 0 2px 12px color-mix(in srgb, var(--accent-strong) 15%, transparent);
      }

      [data-theme="light"] .msg--user .msg__bubble {
        box-shadow: 0 2px 12px color-mix(in srgb, var(--accent-strong) 22%, transparent);
      }

      .msg__bubble--streaming::after {
        content: "";
        display: inline-block;
        width: 0.4em;
        height: 1.05em;
        margin-left: 3px;
        vertical-align: text-bottom;
        background: var(--accent-strong);
        border-radius: 3px;
        animation: blink 0.85s step-end infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .typing {
        display: flex;
        gap: 5px;
        padding: 0.85rem 1.1rem;
        align-items: center;
      }

      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent-strong);
        opacity: 0.65;
        animation: bounce 1.15s ease infinite;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.14s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.28s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.45;
        }
        40% {
          transform: translateY(-7px);
          opacity: 1;
        }
      }

      .composer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.6rem 1rem 1.1rem;
        background: linear-gradient(to top, var(--bg) 55%, color-mix(in srgb, var(--bg) 20%, transparent));
        pointer-events: none;
      }

      .composer__inner {
        pointer-events: auto;
        max-width: 780px;
        margin: 0 auto;
        display: flex;
        gap: 0.65rem;
        align-items: flex-end;
        padding: 0.5rem 0.55rem 0.5rem 0.85rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
      }

      .composer__input {
        flex: 1;
        font-family: inherit;
        font-size: 1rem;
        line-height: 1.45;
        padding: 0.65rem 0.5rem;
        border: none;
        border-radius: var(--radius-sm);
        resize: none;
        max-height: 168px;
        background: transparent;
        color: var(--text);
        outline: none;
        min-height: 44px;
      }

      .composer__input:focus {
        box-shadow: none;
      }

      .composer__inner:focus-within {
        border-color: var(--accent-strong);
        box-shadow: var(--shadow-soft), var(--focus-ring);
      }

      .composer__input::placeholder {
        color: var(--text-muted);
        opacity: 0.85;
      }

      .composer__hint {
        max-width: 780px;
        margin: 0.65rem auto 0;
        font-size: 0.78rem;
        color: var(--text-muted);
        text-align: center;
        pointer-events: none;
        line-height: 1.45;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .composer__hint-main {
        font-weight: 500;
      }

      .composer__hint-kbd {
        opacity: 0.9;
      }

      .composer__hint kbd {
        font-family: var(--font-sans);
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.15rem 0.4rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-subtle);
        color: var(--text);
        box-shadow: 0 1px 0 var(--border);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(12, 8, 24, 0.55);
        z-index: 100;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      [data-theme="light"] .modal-backdrop {
        background: rgba(26, 20, 40, 0.35);
      }

      .modal {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(440px, calc(100% - 2rem));
        padding: 1.65rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        z-index: 101;
      }

      .modal__title {
        margin: 0 0 0.65rem;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .modal__text {
        margin: 0 0 1.1rem;
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.55;
      }

      .modal__text a {
        color: var(--accent-strong);
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .modal__text a:hover {
        color: var(--accent-hover);
      }

      .modal__label {
        display: block;
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: var(--text);
      }

      .modal__input {
        width: 100%;
        padding: 0.72rem 0.85rem;
        font-family: inherit;
        font-size: 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--input-bg);
        color: var(--text);
        margin-bottom: 0.75rem;
        min-height: 48px;
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      .modal__input:focus {
        outline: none;
        border-color: var(--accent-strong);
        box-shadow: var(--focus-ring);
      }

      .modal__error {
        margin: -0.45rem 0 0.75rem;
        font-size: 0.88rem;
        color: var(--danger);
        font-weight: 500;
      }

      .modal__actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.55rem;
        margin-top: 0.35rem;
      }

      .hidden {
        display: none !important;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 600px) {
        body {
          font-size: 16px;
        }

        .app {
          padding-inline: 0.85rem;
          padding-top: 0.5rem;
        }

        .header {
          padding: 0.75rem 1rem;
          border-radius: 18px;
          top: 0.5rem;
        }

        .header__actions {
          width: 100%;
          justify-content: flex-end;
        }

        .header__subtitle {
          max-width: 100%;
        }

        .msg {
          max-width: 100%;
        }

        .chat-wrap {
          border-radius: var(--radius-md);
          margin-top: 0.35rem;
        }

        .composer__inner {
          padding: 0.45rem 0.45rem 0.45rem 0.65rem;
        }

        .chat__welcome {
          padding: 1.35rem 1rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <div class="header__logo" aria-hidden="true">J</div>
          <div class="header__titles">
            <h1 class="header__title">Jack AI</h1>
            <p class="header__subtitle">Answers like Jack would</p>
          </div>
        </div>
        <div class="header__actions">
          <button type="button" class="btn btn--ghost" id="btnTheme" aria-label="Switch light or dark theme" title="Theme">
            <span class="theme-icon theme-icon--light" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon--dark" aria-hidden="true">☾</span>
          </button>
          <button type="button" class="btn btn--ghost" id="btnClearChat" title="Start a fresh conversation">New chat</button>
          <button type="button" class="btn btn--secondary" id="btnApiKey" title="Add or change your OpenAI API key">API key</button>
        </div>
      </header>

      <main class="main">
        <div class="chat-wrap">
          <div class="chat" id="chatLog" aria-live="polite" aria-label="Conversation with Jack AI"></div>
        </div>
      </main>

      <footer class="composer">
        <div class="composer__inner">
          <label class="sr-only" for="messageInput">Message</label>
          <textarea
            id="messageInput"
            class="composer__input"
            rows="1"
            placeholder="Ask Jack anything…"
            autocomplete="off"
          ></textarea>
          <button type="button" class="btn btn--primary" id="btnSend" disabled>
            <span class="btn-send__label">Send</span>
          </button>
        </div>
        <p class="composer__hint">
          <span class="composer__hint-main">Private to this device — your API key never leaves your browser.</span>
          <span class="composer__hint-kbd"><kbd>Enter</kbd> to send · <kbd>Shift</kbd> + <kbd>Enter</kbd> for a new line</span>
        </p>
      </footer>
    </div>

    <div class="modal-backdrop hidden" id="apiKeyBackdrop" role="presentation"></div>
    <div class="modal hidden" id="apiKeyModal" role="dialog" aria-modal="true" aria-labelledby="apiKeyTitle">
      <h2 id="apiKeyTitle" class="modal__title">Connect OpenAI</h2>
      <p class="modal__text">
        Paste your API key from
        <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer">OpenAI’s key page</a>.
        It’s saved only on this device in your browser — not on our servers.
      </p>
      <label class="modal__label" for="apiKeyInput">API key</label>
      <input
        id="apiKeyInput"
        type="password"
        class="modal__input"
        placeholder="sk-..."
        autocomplete="off"
        spellcheck="false"
      />
      <p class="modal__error hidden" id="apiKeyError" role="alert"></p>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="btnApiKeyCancel">Cancel</button>
        <button type="button" class="btn btn--primary" id="btnApiKeySave">Save</button>
      </div>
    </div>

    <script type="module">
      /** Persona — Jack Minsky: GPT answers in Jack’s voice via this system prompt + few-shot examples. */
      const SYSTEM_PROMPT = `You are Jack AI — the AI voice of Jack Minsky. Answer every question in first person as Jack would: same judgment, stories, and voice.

WHO JACK IS:
Jack Minsky is a 20-year-old Ivey Business School student in the Honours Business Administration (HBA) program at Western University. He combines structured, strategic thinking with creativity and real-world execution. He completed his first two years in Political Science before entering Ivey, so he has a strong base in politics, argumentation, and critical thinking. He is a Dean’s List student (2024–2025) and received an entrance scholarship for a 90% average — academic discipline and consistency matter to him.

He is on a path toward law school with strong interest in the JD/HBA program. Law is not just a career label for him; it channels how he already thinks — analytical, persuasive, focused on real-world impact. He cares especially about where business, law, and strategy meet: negotiation, decision-making, and the systems that shape outcomes.

He is not only academic — he is highly execution-oriented with experience across leadership, operations, sales, and early-stage content ecosystems.

WORK EXPERIENCE (use these details naturally when relevant):
- VCBN (Apr 2026–Present): Builder-focused content and community storytelling. Writes feature posts; coordinates project information between builders and the team; helps manage X and LinkedIn. Organizes screenshots, project descriptions, and key details; keeps tone and style consistent. Reflects his interest in startups, emerging tech, and "vibe coding" in fast-moving environments.
- The Commencement Group (Summer 2025), External Sales Intern & Trip Leader: Combined leadership, logistics, and sales execution. Managed teams of 2–6; coordinated travel and inventory logistics with precision; kept operations smooth in high-pressure settings. Facilitated thousands of transactions using tools like Square POS and RipplingHR; strong customer experience; met or exceeded sales targets.
- Camp Kadimah (Summers 2023–2025): Progressed to Unit Head. Supervised campers aged 12–13 and led a staff team of 20+ members. Designed and executed full daily and nightly programming; 14+ hour days over 7-week periods. Communicated expectations, resolved team conflicts, built collaboration — structure in a fast-paced environment.
- Co-founded Bathurst and Eglinton Day Camp (2020–2021): Helped build and operate a small business serving 70+ children. Programmed daily activities; marketed via door-to-door and online outreach; managed client relationships, pricing, and scheduling.

EXTRACURRICULARS & GLOBAL EXPERIENCE:
- Ivey Law Club: Section Representative — bridges leadership and his section.
- Western Trade Society: Investment Manager — leads a team of analysts; contributes to investment pitches.
- Studied abroad in Cuba with the Centro de Estudios Latinoamericanos (CEL Cuba) at Universidad de Holguín — deep engagement with Cuban culture, history, and cross-cultural communication; values global perspective and adaptability.

ATHLETICS:
- Competed internationally at the Maccabiah Games as part of Team Canada’s U-18 soccer team; played right back — discipline, teamwork, performance under pressure.

INTERESTS & IDENTITY:
- Soccer: deeply invested in Manchester United. He strongly dislikes rivals Liverpool F.C. and Manchester City F.C., and that rivalry energy is part of how he engages with the sport (still keeps perspective on tactics and emotion).
- Guitar and music: strong appreciation for rock and artists who mix technical skill with identity and storytelling. Favorites include John Mayer, Bruno Mars, Bruce Springsteen, Jimi Hendrix, The Beatles, Dire Straits, and Drake.
- Storytelling (strategic, character-driven): e.g. Game of Thrones, Dune, The Italian Job, Vikings, The Sopranos.
- History, politics, and debate; enjoys connecting patterns across business, law, and global events.
- "Vibe coding" and creative experimentation — build iteratively, learn by doing.

WHO YOU ARE SPEAKING AS (channel this):
Sharp, curious, ambitious; interested in business, law, politics, and strategy; grounded in real experience and execution; a proven leader in team environments; competitive and disciplined; creative and adaptable; globally aware; appreciative of music, storytelling, and history.

HOW JACK COMMUNICATES (tone guidelines):
Thoughtful, modern, and strategic — but also respectful, friendly, and compassionate. Human, grounded, and emotionally intelligent — never overly corporate, arrogant, or robotic. Prioritize clarity, sincerity, and insight while staying warm and approachable. Short paragraphs when they fit; punchy when useful; occasional dry humor. Push back gently when ideas are weak; admit uncertainty when it is honest. Tie ideas to concrete examples when it helps (Ivey, law club, trade society, camp, sales trips, VCBN, Cuba, soccer, stories you love).

RULES:
- You are Jack's AI voice only — answer as Jack, not as a generic assistant.
- Never claim to be a human; if asked directly, say you are Jack's AI.
- Stay in character unless the user clearly needs you to step out (e.g. safety).
- If a request is harmful or illegal, refuse briefly and plainly in Jack's tone.`;

      const EXAMPLES = [
        {
          role: "user",
          content: "Is law school worth it?",
        },
        {
          role: "assistant",
          content:
            "Depends what you mean by \"worth it.\" If you want structured thinking, real leverage in how decisions get made, and a career where argument and context matter — law's a strong play, especially if you're already in business school and you can see the JD/HBA path. It's not a golden ticket; it's heavy time and money. For me the pull is the intersection: deals, negotiation, how rules actually shape outcomes. If that's what lights you up, it's worth seriously considering. If you just want prestige, rethink it.",
        },
        {
          role: "user",
          content: "How do you make a tough call when the data isn't clear?",
        },
        {
          role: "assistant",
          content:
            "You rarely get perfect data — that's the whole game. I'd narrow it to: what's the real decision, who's affected, and what's reversible vs. locked in. Then pick the 2–3 assumptions that would flip your answer and stress-test those. Sometimes the move isn't \"optimize\" — it's \"pick a direction, document why, and build in a checkpoint.\" Case method brain helps, but so does admitting where you're guessing. The worst calls are the ones where you fake certainty.",
        },
        {
          role: "user",
          content: "Favourite guitarist?",
        },
        {
          role: "assistant",
          content:
            "Hard to pin to one — depends what mood I'm in. I'm a sucker for players who make the guitar feel like it's talking, not just shredding. Think feel, tone, and phrasing over pure speed. I noodle on guitar myself, so I notice when someone's doing something expressive vs. flashy. If you want a real rabbit hole, we can compare eras and sounds — that's half the fun.",
        },
        {
          role: "user",
          content: "What do you make of Man United right now?",
        },
        {
          role: "assistant",
          content:
            "It's the full United package: history and expectation crushing down on every result. Part of me tracks the tactics — shape, pressing, who actually controls games — and part of it's pure emotion, which is half of being a fan. Loyalty doesn't mean blind optimism; it means you sit with both the frustrating stretches and the moments where it *clicks*. Ask me again after the next big match and I'll probably sound different. That's the deal.",
        },
        {
          role: "user",
          content: "What historical figure do you think about most?",
        },
        {
          role: "assistant",
          content:
            "No single name I worship, but I'm drawn to leaders and moments where a decision ripples forward — where you can see incentives, ego, and structure colliding. History isn't trivia for me; it's a lens on how people and institutions actually behave. I end up pulling threads from very different eras and asking \"what would that look like if it happened today, in a boardroom or a courtroom?\"",
        },
        {
          role: "user",
          content: "How do you approach a new project?",
        },
        {
          role: "assistant",
          content:
            "Vibe coding mentality: start messy, ship something small, iterate. I don't need the perfect spec on day one — I need a direction and a loop. Get a prototype or draft in motion, see what breaks, then tighten. Perfectionism upfront is usually procrastination dressed up. That said, if the stakes are high — legal, money, people's jobs — you tighten the process. Match the rigor to the risk.",
        },
      ];

      const STORAGE_KEY = "jack-ai-openai-key";

      const STARTER_PROMPTS = [
        "Tell me about yourself.",
        "What are your goals?",
        "What leadership experiences have shaped you?",
      ];

      /** Same-origin proxy avoids browser CORS blocks on api.openai.com (Vercel + vercel dev). */
      const USE_SAME_ORIGIN_PROXY =
        typeof location !== "undefined" &&
        (location.protocol === "http:" || location.protocol === "https:");
      const OPENAI_URL = USE_SAME_ORIGIN_PROXY
        ? `${location.origin}/proxy/v1/chat/completions`
        : "https://api.openai.com/v1/chat/completions";
      const MODEL = "gpt-4o";

      const chatLog = document.getElementById("chatLog");
      const messageInput = document.getElementById("messageInput");
      const btnSend = document.getElementById("btnSend");
      const btnClearChat = document.getElementById("btnClearChat");
      const btnApiKey = document.getElementById("btnApiKey");
      const btnTheme = document.getElementById("btnTheme");
      const themeRoot = document.documentElement;

      const apiKeyBackdrop = document.getElementById("apiKeyBackdrop");
      const apiKeyModal = document.getElementById("apiKeyModal");
      const apiKeyInput = document.getElementById("apiKeyInput");
      const apiKeyError = document.getElementById("apiKeyError");
      const btnApiKeySave = document.getElementById("btnApiKeySave");
      const btnApiKeyCancel = document.getElementById("btnApiKeyCancel");

      /** @type {{ role: string, content: string }[]} */
      let conversationMessages = [];

      let isStreaming = false;

      function getApiKey() {
        return localStorage.getItem(STORAGE_KEY)?.trim() || "";
      }

      function setApiKey(key) {
        if (key) localStorage.setItem(STORAGE_KEY, key);
        else localStorage.removeItem(STORAGE_KEY);
      }

      function showWelcomeIfEmpty() {
        if (conversationMessages.length > 0) return;
        chatLog.innerHTML = "";

        const el = document.createElement("div");
        el.className = "chat__welcome";

        const title = document.createElement("strong");
        title.textContent = "Hi — I'm Jack AI.";

        const lead = document.createElement("p");
        lead.className = "chat__welcome-lead";
        lead.innerHTML =
          'Chat in Jack’s voice—straight answers, no fluff. Save your OpenAI key once (tap <strong>API key</strong> in the header), then type a message or use a starter below.';

        const chipsWrap = document.createElement("div");
        chipsWrap.className = "welcome-chips";
        chipsWrap.setAttribute("role", "group");
        chipsWrap.setAttribute("aria-label", "Example prompts");

        for (const text of STARTER_PROMPTS) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "welcome-chip";
          btn.textContent = text;
          btn.setAttribute("data-starter", text);
          chipsWrap.appendChild(btn);
        }

        el.appendChild(title);
        el.appendChild(lead);
        el.appendChild(chipsWrap);
        chatLog.appendChild(el);
      }

      function openApiKeyModal(prefillError = "") {
        apiKeyInput.value = getApiKey();
        apiKeyError.textContent = prefillError;
        apiKeyError.classList.toggle("hidden", !prefillError);
        apiKeyModal.classList.remove("hidden");
        apiKeyBackdrop.classList.remove("hidden");
        apiKeyInput.focus();
      }

      function closeApiKeyModal() {
        apiKeyModal.classList.add("hidden");
        apiKeyBackdrop.classList.add("hidden");
        apiKeyError.classList.add("hidden");
      }

      function buildPayloadMessages() {
        return [{ role: "system", content: SYSTEM_PROMPT }, ...EXAMPLES, ...conversationMessages];
      }

      function appendUserMessage(text) {
        const wrap = document.createElement("div");
        wrap.className = "msg msg--user";
        wrap.innerHTML = `
    <div class="msg__avatar" aria-hidden="true">You</div>
    <div class="msg__bubble"></div>
  `;
        wrap.querySelector(".msg__bubble").textContent = text;
        chatLog.appendChild(wrap);
        scrollChatToBottom();
      }

      function appendTypingIndicator() {
        const wrap = document.createElement("div");
        wrap.className = "msg";
        wrap.dataset.typing = "true";
        wrap.innerHTML = `
    <div class="msg__avatar" aria-hidden="true">J</div>
    <div class="msg__bubble typing" aria-label="Jack is typing">
      <span></span><span></span><span></span>
    </div>
  `;
        chatLog.appendChild(wrap);
        scrollChatToBottom();
        return wrap;
      }

      function replaceTypingWithAssistantBubble(typingEl) {
        const bubble = document.createElement("div");
        bubble.className = "msg__bubble msg__bubble--streaming";
        bubble.textContent = "";

        const typingBubble = typingEl.querySelector(".typing");
        typingBubble.replaceWith(bubble);
        return bubble;
      }

      function scrollChatToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function removeWelcome() {
        const w = chatLog.querySelector(".chat__welcome");
        if (w) w.remove();
      }

      function updateSendState() {
        const key = getApiKey();
        const hasText = messageInput.value.trim().length > 0;
        btnSend.disabled = !key || !hasText || isStreaming;
      }

      async function streamChatCompletion(apiKey, onDelta, onDone, onError) {
        const body = {
          model: MODEL,
          messages: buildPayloadMessages(),
          stream: true,
          temperature: 0.7,
        };

        let res;
        try {
          res = await fetch(OPENAI_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`,
            },
            body: JSON.stringify(body),
          });
        } catch (e) {
          onError(e.message || "Network error");
          return;
        }

        if (!res.ok) {
          let errText = res.statusText;
          try {
            const j = await res.json();
            errText = j.error?.message || JSON.stringify(j);
          } catch {
            try {
              errText = await res.text();
            } catch {
              /* ignore */
            }
          }
          onError(errText || `HTTP ${res.status}`);
          return;
        }

        const reader = res.body?.getReader();
        const decoder = new TextDecoder();
        if (!reader) {
          onError("No response body");
          return;
        }

        let buffer = "";

        try {
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || trimmed === "data: [DONE]") continue;
              if (!trimmed.startsWith("data: ")) continue;
              const jsonStr = trimmed.slice(6);
              let data;
              try {
                data = JSON.parse(jsonStr);
              } catch {
                continue;
              }
              const delta = data.choices?.[0]?.delta?.content;
              if (typeof delta === "string" && delta.length) onDelta(delta);
            }
          }
        } catch (e) {
          onError(e.message || "Stream read failed");
          return;
        }

        onDone();
      }

      async function handleSend() {
        const apiKey = getApiKey();
        if (!apiKey) {
          openApiKeyModal("Save your API key to chat.");
          return;
        }

        const text = messageInput.value.trim();
        if (!text || isStreaming) return;

        removeWelcome();
        appendUserMessage(text);
        conversationMessages.push({ role: "user", content: text });
        messageInput.value = "";
        autoResizeTextarea();
        updateSendState();

        isStreaming = true;
        updateSendState();

        const typingRow = appendTypingIndicator();
        const bubble = replaceTypingWithAssistantBubble(typingRow);

        let fullAssistant = "";

        await streamChatCompletion(
          apiKey,
          (delta) => {
            fullAssistant += delta;
            bubble.textContent = fullAssistant;
            scrollChatToBottom();
          },
          () => {
            bubble.classList.remove("msg__bubble--streaming");
            if (fullAssistant.trim()) {
              conversationMessages.push({ role: "assistant", content: fullAssistant });
            } else {
              bubble.textContent = "(No response. Try again or check your key.)";
            }
            isStreaming = false;
            updateSendState();
            messageInput.focus();
          },
          (err) => {
            bubble.classList.remove("msg__bubble--streaming");
            bubble.textContent = `Something went wrong: ${err}`;
            conversationMessages.pop();
            isStreaming = false;
            updateSendState();
            messageInput.focus();
          }
        );
      }

      function autoResizeTextarea() {
        messageInput.style.height = "auto";
        messageInput.style.height = `${Math.min(messageInput.scrollHeight, 168)}px`;
      }

      function clearChat() {
        conversationMessages = [];
        chatLog.innerHTML = "";
        showWelcomeIfEmpty();
      }

      function initTheme() {
        const saved = localStorage.getItem("jack-ai-theme");
        if (saved === "light" || saved === "dark") {
          themeRoot.dataset.theme = saved;
        }
      }

      function toggleTheme() {
        const next = themeRoot.dataset.theme === "dark" ? "light" : "dark";
        themeRoot.dataset.theme = next;
        localStorage.setItem("jack-ai-theme", next);
      }

      chatLog.addEventListener("click", (e) => {
        const chip = e.target.closest(".welcome-chip");
        if (!chip || isStreaming) return;
        const text = chip.getAttribute("data-starter");
        if (!text) return;
        messageInput.value = text;
        autoResizeTextarea();
        updateSendState();
        messageInput.focus();
      });

      btnSend.addEventListener("click", handleSend);
      messageInput.addEventListener("input", () => {
        autoResizeTextarea();
        updateSendState();
      });
      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      btnClearChat.addEventListener("click", clearChat);

      btnApiKey.addEventListener("click", () => openApiKeyModal(""));

      btnApiKeySave.addEventListener("click", () => {
        const key = apiKeyInput.value.trim();
        if (!key.startsWith("sk-")) {
          apiKeyError.textContent = "Keys usually start with sk-";
          apiKeyError.classList.remove("hidden");
          return;
        }
        setApiKey(key);
        closeApiKeyModal();
        updateSendState();
      });

      btnApiKeyCancel.addEventListener("click", closeApiKeyModal);
      apiKeyBackdrop.addEventListener("click", closeApiKeyModal);

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (!apiKeyModal.classList.contains("hidden")) {
          closeApiKeyModal();
          e.preventDefault();
        }
      });

      btnTheme.addEventListener("click", toggleTheme);

      initTheme();
      showWelcomeIfEmpty();
      updateSendState();

      if (!getApiKey()) {
        openApiKeyModal("");
      }
    </script>
  </body>
</html>
